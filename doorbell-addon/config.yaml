# https://developers.home-assistant.io/docs/add-ons/configuration
name: "WhoRang Doorbell"
version: "1.0.154"
slug: "doorbell_face_recognition"
description: "Doorbell event history with image capture and weather integration"
url: "https://github.com/Beast12/whorang"
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
map:
  - "share:rw"
  - "ssl"
  - "media:rw"
  - "config:rw"
options:
  camera_entity: ""
  camera_url: "rtsp://192.168.1.100:554/stream"
  storage_path: "/share/doorbell"
  retention_days: 30
  notification_webhook: ""
  ha_access_token: ""
  face_recognition_enabled: false
  face_recognition_model: "buffalo_sc"
schema:
  camera_entity: "str?"
  camera_url: "str"
  storage_path: "str"
  retention_days: "int(1,365)"
  notification_webhook: "str?"
  ha_access_token: "str?"
  face_recognition_enabled: bool
  face_recognition_model: "list(buffalo_sc|buffalo_s|buffalo_l)?"
ports:
  "8099/tcp": 8099
ports_description:
  "8099/tcp": "Web interface"
panel_icon: "mdi:doorbell-video"
panel_title: "WhoRang Doorbell"
ingress: true
ingress_port: 8099
homeassistant_api: true
image: "ghcr.io/beast12/whorang-doorbell-addon"
