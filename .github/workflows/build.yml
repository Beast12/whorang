name: Build and Publish WhoRang Doorbell Addon

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/beast12/whorang-doorbell-addon

jobs:
  version-check:
    name: Version Consistency Check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      is_release: ${{ steps.check_release.outputs.is_release }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=dev" >> $GITHUB_OUTPUT
          fi

      - name: Check if release
        id: check_release
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate version consistency
        if: steps.check_release.outputs.is_release == 'true'
        run: |
          VERSION=${{ steps.get_version.outputs.version }}

          CONFIG_VERSION=$(grep "^version:" doorbell-addon/config.yaml | cut -d'"' -f2)
          if [ "$CONFIG_VERSION" != "$VERSION" ]; then
            echo "❌ config.yaml version mismatch: $CONFIG_VERSION != $VERSION"
            exit 1
          fi

          BUILD_VERSION=$(grep "org.opencontainers.image.version:" doorbell-addon/build.yaml | cut -d'"' -f2)
          if [ "$BUILD_VERSION" != "$VERSION" ]; then
            echo "❌ build.yaml version mismatch: $BUILD_VERSION != $VERSION"
            exit 1
          fi

          if ! grep -q "# Version: $VERSION" doorbell-addon/requirements.txt; then
            echo "❌ Version not found in requirements.txt"
            exit 1
          fi

          echo "✅ All version checks passed for v$VERSION"

  lint:
    name: Lint and Test
    runs-on: ubuntu-latest
    needs: version-check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy
          pip install -r doorbell-addon/requirements.txt

      - name: Lint with flake8 (errors)
        run: |
          flake8 doorbell-addon/src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint with flake8 (style warnings)
        run: |
          flake8 doorbell-addon/src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Type checking with mypy
        run: |
          mypy doorbell-addon/src/ --config-file doorbell-addon/mypy.ini

      - name: Validate addon configuration
        run: |
          python -c "
          import yaml

          with open('doorbell-addon/config.yaml') as f:
              config = yaml.safe_load(f)

          for field in ['name', 'version', 'slug', 'description', 'arch']:
              assert field in config, f'Missing required field: {field}'

          with open('doorbell-addon/build.yaml') as f:
              yaml.safe_load(f)

          print('✅ config.yaml and build.yaml are valid')
          "

  build:
    name: Build ${{ matrix.arch }} image
    runs-on: ubuntu-latest
    needs: [version-check, lint]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: ghcr.io/hassio-addons/base/amd64:18.1.0
          - arch: aarch64
            platform: linux/arm64
            build_from: ghcr.io/hassio-addons/base/aarch64:18.1.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        if: needs.version-check.outputs.is_release == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push (release)
        if: needs.version-check.outputs.is_release == 'true'
        uses: docker/build-push-action@v5
        with:
          context: doorbell-addon
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE }}-${{ matrix.arch }}:${{ needs.version-check.outputs.version }}
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            DOORBELL_VERSION=${{ needs.version-check.outputs.version }}

      - name: Test build (non-release)
        if: needs.version-check.outputs.is_release == 'false'
        uses: docker/build-push-action@v5
        with:
          context: doorbell-addon
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
            DOORBELL_VERSION=dev

  publish-manifest:
    name: Publish multi-arch manifest
    runs-on: ubuntu-latest
    needs: [version-check, build]
    if: needs.version-check.outputs.is_release == 'true'
    steps:
      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.IMAGE }}:${{ needs.version-check.outputs.version }} \
            --tag ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}-amd64:${{ needs.version-check.outputs.version }} \
            ${{ env.IMAGE }}-aarch64:${{ needs.version-check.outputs.version }}

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect ${{ env.IMAGE }}:${{ needs.version-check.outputs.version }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version-check, publish-manifest]
    if: needs.version-check.outputs.is_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          CURRENT_TAG=${{ github.ref_name }}

          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" ${PREVIOUS_TAG}..${CURRENT_TAG})
          else
            CHANGELOG=$(git log --pretty=format:"- %s" ${CURRENT_TAG})
          fi

          cat > CHANGELOG.md << EOF
          # WhoRang Doorbell ${{ needs.version-check.outputs.version }}

          ## Changes
          ${CHANGELOG}

          ## Docker Images

          - \`${{ env.IMAGE }}:${{ needs.version-check.outputs.version }}\` (multi-arch: amd64, aarch64)
          - \`${{ env.IMAGE }}-amd64:${{ needs.version-check.outputs.version }}\`
          - \`${{ env.IMAGE }}-aarch64:${{ needs.version-check.outputs.version }}\`
          EOF

          echo "changelog_file=CHANGELOG.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: WhoRang Doorbell ${{ needs.version-check.outputs.version }}
          body_path: ${{ steps.changelog.outputs.changelog_file }}
          draft: false
          prerelease: false
          files: doorbell-addon/config.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_PAT }}

  update-repository:
    name: Update Repository Metadata
    runs-on: ubuntu-latest
    needs: [version-check, create-release]
    if: needs.version-check.outputs.is_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}
          ref: main

      - name: Update repository.yaml
        run: |
          VERSION=${{ needs.version-check.outputs.version }}
          cat > repository.yaml << EOF
          name: "WhoRang Doorbell Add-on Repository"
          url: "https://github.com/${{ github.repository }}"
          maintainer: "${{ github.repository_owner }}"
          EOF

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add repository.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update repository metadata for v${{ needs.version-check.outputs.version }}"
            git push origin main
          fi
